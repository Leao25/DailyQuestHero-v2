<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Ground Generator — DailyQuestHero</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; color: #eee; font-family: monospace; display: flex; height: 100vh; overflow: hidden; }

#sidebar {
  width: 240px; min-width: 240px; background: #0f0f1a;
  padding: 16px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto;
}

h2 { color: #f0c040; font-size: 14px; }
label { font-size: 11px; color: #aaa; display: block; margin-bottom: 3px; }

input[type=number] {
  width: 100%; background: #222; border: 1px solid #444; color: #eee;
  padding: 5px 8px; border-radius: 4px; font-size: 13px;
}
input[type=range] { width: 100%; }
input[type=color] { width: 40px; height: 28px; border: none; background: none; cursor: pointer; padding: 0; }

.section { border-top: 1px solid #333; padding-top: 12px; display: flex; flex-direction: column; gap: 8px; }

.color-row {
  display: flex; align-items: center; gap: 8px;
}
.color-row label { margin: 0; flex: 1; }
.color-weight { width: 50px; }

button {
  width: 100%; padding: 8px; border: none; border-radius: 4px;
  cursor: pointer; font-size: 12px; font-family: monospace;
}
.btn-gen    { background: #2a6644; color: #fff; }
.btn-export { background: #f0c040; color: #111; font-weight: bold; }
button:hover { filter: brightness(1.15); }

#main {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px; padding: 20px;
}

#preview-wrap {
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px; overflow: hidden;
  image-rendering: pixelated;
}

#preview-canvas { display: block; image-rendering: pixelated; }

#zoom-wrap {
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px; overflow: hidden;
}
#zoom-canvas { display: block; image-rendering: pixelated; }

.hint { font-size: 11px; color: rgba(255,255,255,0.3); text-align: center; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>Ground Generator</h2>

  <div class="section">
    <div>
      <label>Largura (px)</label>
      <input type="number" id="inp-w" value="720" min="32" max="1024" step="8"/>
    </div>
    <div>
      <label>Altura (px)</label>
      <input type="number" id="inp-h" value="32" min="4" max="128" step="2"/>
    </div>
  </div>

  <div class="section">
    <label style="color:#f0c040">Cores (arraste para misturar)</label>

    <div class="color-row">
      <input type="color" id="c1" value="#3d8c1e"/>
      <label>Verde claro</label>
      <input type="number" class="color-weight" id="w1" value="25" min="0" max="100"/>
    </div>
    <div class="color-row">
      <input type="color" id="c2" value="#2d6e14"/>
      <label>Verde escuro</label>
      <input type="number" class="color-weight" id="w2" value="35" min="0" max="100"/>
    </div>
    <div class="color-row">
      <input type="color" id="c3" value="#5ab020"/>
      <label>Verde brilhante</label>
      <input type="number" class="color-weight" id="w3" value="20" min="0" max="100"/>
    </div>
    <div class="color-row">
      <input type="color" id="c4" value="#3d2008"/>
      <label>Terra</label>
      <input type="number" class="color-weight" id="w4" value="20" min="0" max="100"/>
    </div>
  </div>

  <div class="section">
    <div>
      <label>Seed (0 = aleatório)</label>
      <input type="number" id="inp-seed" value="0" min="0"/>
    </div>
    <div>
      <label>Ruído <span id="noise-label">40%</span></label>
      <input type="range" id="inp-noise" min="0" max="100" value="40"
             oninput="document.getElementById('noise-label').textContent=this.value+'%'"/>
    </div>
  </div>

  <div class="section">
    <button class="btn-gen" onclick="generate()">⟳ Gerar</button>
    <div>
      <label>Nome do arquivo</label>
      <input type="text" id="filename" value="fase1_ground"
             style="width:100%;background:#222;border:1px solid #444;color:#eee;padding:5px 8px;border-radius:4px;font-size:13px"/>
    </div>
    <button class="btn-export" onclick="exportPng()">💾 Exportar PNG</button>
  </div>
</div>

<div id="main">
  <div class="hint">Tamanho real (1×)</div>
  <div id="preview-wrap">
    <canvas id="preview-canvas"></canvas>
  </div>
  <div class="hint">Zoom 8×</div>
  <div id="zoom-wrap">
    <canvas id="zoom-canvas"></canvas>
  </div>
</div>

<script>
const preview = document.getElementById('preview-canvas');
const zoom    = document.getElementById('zoom-canvas');
const pctx    = preview.getContext('2d');
const zctx    = zoom.getContext('2d');

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function generate() {
  const W     = parseInt(document.getElementById('inp-w').value) || 720;
  const H     = parseInt(document.getElementById('inp-h').value) || 32;
  const noise = parseInt(document.getElementById('inp-noise').value) / 100;
  let   seed  = parseInt(document.getElementById('inp-seed').value) || 0;
  if (seed === 0) seed = Math.floor(Math.random() * 99999);
  document.getElementById('inp-seed').value = seed;

  const colors = [
    { rgb: hexToRgb(document.getElementById('c1').value), w: parseInt(document.getElementById('w1').value) },
    { rgb: hexToRgb(document.getElementById('c2').value), w: parseInt(document.getElementById('w2').value) },
    { rgb: hexToRgb(document.getElementById('c3').value), w: parseInt(document.getElementById('w3').value) },
    { rgb: hexToRgb(document.getElementById('c4').value), w: parseInt(document.getElementById('w4').value) },
  ];
  const totalW = colors.reduce((s,c) => s + c.w, 0) || 1;

  // seeded random
  let s = seed;
  function rand() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  }

  function pickColor() {
    let r = rand() * totalW;
    for (const c of colors) {
      r -= c.w;
      if (r <= 0) return c.rgb;
    }
    return colors[colors.length - 1].rgb;
  }

  preview.width  = W;
  preview.height = H;
  const imageData = pctx.createImageData(W, H);
  const data = imageData.data;

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const base = pickColor();
      const n = (rand() - 0.5) * noise * 60;
      const idx = (y * W + x) * 4;
      data[idx]   = Math.max(0, Math.min(255, base[0] + n));
      data[idx+1] = Math.max(0, Math.min(255, base[1] + n));
      data[idx+2] = Math.max(0, Math.min(255, base[2] + n));
      data[idx+3] = 255;
    }
  }

  pctx.putImageData(imageData, 0, 0);

  // zoom 8x
  const zs = 8;
  zoom.width  = Math.min(W * zs, 720);
  zoom.height = H * zs;
  zctx.imageSmoothingEnabled = false;
  zctx.drawImage(preview, 0, 0, zoom.width, zoom.height);
}

function exportPng() {
  const name = document.getElementById('filename').value || 'ground';
  const a = document.createElement('a');
  a.download = `${name}.png`;
  a.href = preview.toDataURL('image/png');
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

generate();
</script>
</body>
</html>
