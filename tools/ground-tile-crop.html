<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Ground Tile Crop — DailyQuestHero</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; color: #eee; font-family: monospace; display: flex; height: 100vh; overflow: hidden; }

#sidebar {
  width: 220px; min-width: 220px; background: #0f0f1a;
  padding: 16px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto;
}

h2 { color: #f0c040; font-size: 14px; }
label { font-size: 11px; color: #aaa; display: block; margin-bottom: 3px; }

input[type=number] {
  width: 100%; background: #222; border: 1px solid #444; color: #eee;
  padding: 5px 8px; border-radius: 4px; font-size: 13px;
}

button {
  width: 100%; padding: 8px; border: none; border-radius: 4px;
  cursor: pointer; font-size: 12px; font-family: monospace;
}
.btn-load   { background: #2a5caa; color: #fff; }
.btn-export { background: #f0c040; color: #111; font-weight: bold; }
button:hover { filter: brightness(1.15); }
button:disabled { opacity: 0.35; cursor: default; filter: none; }

#status { font-size: 11px; color: #888; min-height: 16px; }

.section { border-top: 1px solid #333; padding-top: 10px; }

#preview-wrap {
  background: #111; border: 1px solid #333; border-radius: 4px;
  width: 100%; aspect-ratio: 1; overflow: hidden; display: flex;
  align-items: center; justify-content: center;
}
#preview-canvas { image-rendering: pixelated; max-width: 100%; max-height: 100%; }

#selected-label { font-size: 11px; color: #888; text-align: center; }

#main { flex: 1; overflow: auto; padding: 16px; }
#canvas-wrap { position: relative; display: inline-block; cursor: crosshair; }
#img-canvas { display: block; image-rendering: pixelated; }

.grid-overlay {
  position: absolute; top: 0; left: 0; pointer-events: none;
}
</style>
</head>
<body>

<div id="sidebar">
  <h2>Ground Tile Crop</h2>

  <div>
    <label>Imagem do tileset</label>
    <button class="btn-load" onclick="document.getElementById('file-input').click()">📂 Abrir imagem</button>
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="loadImage(event)"/>
  </div>

  <div id="status">Nenhuma imagem carregada</div>

  <div class="section">
    <label>Zoom</label>
    <input type="range" id="zoom" min="1" max="8" step="0.5" value="3"
           oninput="document.getElementById('zoom-label').textContent=this.value+'×'; redraw()"
           style="width:100%"/>
    <span id="zoom-label" style="font-size:11px;color:#888">3×</span>
  </div>

  <div class="section">
    <label>Colunas no tileset</label>
    <input type="number" id="cols" value="4" min="1" max="32" oninput="redraw()"/>
    <label style="margin-top:8px">Linhas no tileset</label>
    <input type="number" id="rows" value="4" min="1" max="32" oninput="redraw()"/>
  </div>

  <div class="section">
    <div id="selected-label">Clique em um tile</div>
    <div id="preview-wrap">
      <canvas id="preview-canvas" width="64" height="64"></canvas>
    </div>
  </div>

  <div class="section">
    <label>Nome do arquivo</label>
    <input type="text" id="filename" value="ground_tile"
           style="width:100%;background:#222;border:1px solid #444;color:#eee;padding:5px 8px;border-radius:4px;font-size:13px"/>
    <button class="btn-export" id="btn-export" style="margin-top:8px" onclick="exportTile()" disabled>
      💾 Exportar tile selecionado
    </button>
  </div>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="img-canvas"></canvas>
    <canvas class="grid-overlay" id="grid-canvas"></canvas>
  </div>
</div>

<script>
let img = null;
let zoom = 3;
let selectedCol = -1, selectedRow = -1;

const imgCanvas  = document.getElementById('img-canvas');
const gridCanvas = document.getElementById('grid-canvas');
const imgCtx     = imgCanvas.getContext('2d');
const gridCtx    = gridCanvas.getContext('2d');
const preview    = document.getElementById('preview-canvas');
const previewCtx = preview.getContext('2d');

function loadImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  img = new Image();
  img.onload = () => {
    document.getElementById('status').textContent = `${file.name} — ${img.width}×${img.height}px`;
    selectedCol = -1; selectedRow = -1;
    document.getElementById('btn-export').disabled = true;
    document.getElementById('selected-label').textContent = 'Clique em um tile';
    redraw();
  };
  img.src = url;
}

function redraw() {
  if (!img) return;
  zoom = parseFloat(document.getElementById('zoom').value);
  const cols = parseInt(document.getElementById('cols').value) || 1;
  const rows = parseInt(document.getElementById('rows').value) || 1;
  const W = Math.round(img.width  * zoom);
  const H = Math.round(img.height * zoom);

  imgCanvas.width  = W; imgCanvas.height  = H;
  gridCanvas.width = W; gridCanvas.height = H;
  gridCanvas.style.width  = W + 'px';
  gridCanvas.style.height = H + 'px';

  imgCtx.imageSmoothingEnabled = false;
  imgCtx.drawImage(img, 0, 0, W, H);

  const tw = W / cols;
  const th = H / rows;

  // highlight selecionado
  if (selectedCol >= 0) {
    gridCtx.fillStyle = 'rgba(240,192,64,0.25)';
    gridCtx.fillRect(selectedCol * tw, selectedRow * th, tw, th);
    gridCtx.strokeStyle = '#f0c040';
    gridCtx.lineWidth = 2;
    gridCtx.strokeRect(selectedCol * tw + 1, selectedRow * th + 1, tw - 2, th - 2);
  }

  // grade
  gridCtx.strokeStyle = 'rgba(255,255,255,0.2)';
  gridCtx.lineWidth = 1;
  for (let c = 1; c < cols; c++) {
    gridCtx.beginPath();
    gridCtx.moveTo(c * tw, 0); gridCtx.lineTo(c * tw, H);
    gridCtx.stroke();
  }
  for (let r = 1; r < rows; r++) {
    gridCtx.beginPath();
    gridCtx.moveTo(0, r * th); gridCtx.lineTo(W, r * th);
    gridCtx.stroke();
  }
}

document.getElementById('canvas-wrap').addEventListener('click', e => {
  if (!img) return;
  const cols = parseInt(document.getElementById('cols').value) || 1;
  const rows = parseInt(document.getElementById('rows').value) || 1;
  const rect = imgCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const tw = imgCanvas.width  / cols;
  const th = imgCanvas.height / rows;

  selectedCol = Math.floor(mx / tw);
  selectedRow = Math.floor(my / th);
  selectedCol = Math.max(0, Math.min(cols - 1, selectedCol));
  selectedRow = Math.max(0, Math.min(rows - 1, selectedRow));

  // tile source em px da imagem original
  const srcTW = img.width  / cols;
  const srcTH = img.height / rows;
  const sx = selectedCol * srcTW;
  const sy = selectedRow * srcTH;

  preview.width  = Math.round(srcTW);
  preview.height = Math.round(srcTH);
  previewCtx.imageSmoothingEnabled = false;
  previewCtx.drawImage(img, sx, sy, srcTW, srcTH, 0, 0, preview.width, preview.height);

  document.getElementById('selected-label').textContent =
    `Tile ${selectedCol + 1}×${selectedRow + 1} — ${Math.round(srcTW)}×${Math.round(srcTH)}px`;
  document.getElementById('btn-export').disabled = false;

  gridCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
  redraw();
});

function exportTile() {
  if (selectedCol < 0 || !img) return;
  const cols  = parseInt(document.getElementById('cols').value) || 1;
  const rows  = parseInt(document.getElementById('rows').value) || 1;
  const srcTW = img.width  / cols;
  const srcTH = img.height / rows;
  const sx = selectedCol * srcTW;
  const sy = selectedRow * srcTH;

  const out = document.createElement('canvas');
  out.width  = Math.round(srcTW);
  out.height = Math.round(srcTH);
  const octx = out.getContext('2d');
  octx.imageSmoothingEnabled = false;
  octx.drawImage(img, sx, sy, srcTW, srcTH, 0, 0, out.width, out.height);

  const name = document.getElementById('filename').value || 'ground_tile';
  const a = document.createElement('a');
  a.download = `${name}.png`;
  a.href = out.toDataURL('image/png');
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>
</body>
</html>
