<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DailyQuestHero</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="period-night">
  <canvas id="cloud-canvas"></canvas>
  <div id="page-wrapper">
    <img id="logo" src="assets/logo/dqh_logo.png" alt="DailyQuestHero" />

    <div id="game-area">

      <!-- Painel esquerdo: Inventário -->
      <div id="inv-panel" class="side-panel">
        <div class="panel-title">Inventário</div>
        <div id="inv-grid"></div>
      </div>

      <!-- Centro: canvas + hud -->
      <div id="game-center">
        <canvas id="game-canvas" width="720" height="180"></canvas>
        <div id="hud">
          <div id="hud-left">
            <span id="hud-name">—</span>
            <span id="hud-level">Lv.1</span>
          </div>
          <div id="hud-bars">
            <div class="hud-bar-row">
              <span class="hud-bar-label">HP</span>
              <div class="hud-bar-bg"><div class="hud-bar-fill hp" id="hud-hp-bar" style="width:100%"></div></div>
              <span class="hud-bar-text" id="hud-hp-text">100/100</span>
            </div>
            <div class="hud-bar-row">
              <span class="hud-bar-label">XP</span>
              <div class="hud-bar-bg"><div class="hud-bar-fill xp" id="hud-xp-bar" style="width:0%"></div></div>
            </div>
          </div>
          <div id="hud-right">
            <span id="hud-gold">0g</span>
            <button id="hud-auto" class="auto-btn">Auto</button>
          </div>
        </div>
      </div>

      <!-- Painel direito: Baús -->
      <div id="chest-panel" class="side-panel">
        <div class="panel-title">Baús</div>
        <div id="chest-grid">
          <div id="chest-slot-normal"    class="chest-slot"></div>
          <div id="chest-slot-rare"      class="chest-slot"></div>
          <div id="chest-slot-mythic"    class="chest-slot"></div>
          <div id="chest-slot-legendary" class="chest-slot"></div>
        </div>
      </div>

    </div><!-- /game-area -->

    <div id="gameover" class="hidden">
      <div id="gameover-box">
        <h2>Game Over</h2>
        <div class="go-stats">
          <div class="go-row"><span>Nível</span><span id="go-level">—</span></div>
          <div class="go-row"><span>Mobs</span><span id="go-mobs">—</span></div>
          <div class="go-row"><span>Ouro</span><span id="go-gold">—</span></div>
          <div class="go-row"><span>Tempo</span><span id="go-time">—</span></div>
        </div>
        <button id="go-restart">Reiniciar</button>
        <p id="go-auto-msg" class="hidden"></p>
      </div>
    </div>

  </div><!-- /page-wrapper -->

  <script src="js/gameover.js"></script>
  <script src="js/clouds.js"></script>
  <script src="js/config.js"></script>
  <script src="js/bgSystem.js"></script>
  <script src="js/hero.js"></script>
  <script src="js/mob.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/chestHud.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
